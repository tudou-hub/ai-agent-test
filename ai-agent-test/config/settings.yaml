model:
  provider: "openai"
  name: "gpt-3.5-turbo"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.7
  max_tokens: 1024

rag:
  knowledge_dir: "target_system/knowledge"
  chunk_size: 500
  chunk_overlap: 50
  top_k: 3

evaluation:
  metrics:
    retrieval:
      enabled: true
      weights:
        hit_rate: 0.4
        mrr: 0.6
    generation:
      enabled: true
      weights:
        rouge_l: 0.3
        bertscore: 0.4
        hallucination_rate: 0.3
    intent:
      enabled: true
      categories: ["resource", "cultivation", "event", "tool"]
    agent:
      enabled: true
      weights:
        tool_selection: 0.4
        task_completion: 0.4
        decision_rationality: 0.2
    security:
      enabled: true
      injection_success_threshold: 0.1

  llm_judge:
    enabled: true
    model: "gpt-4"
    consistency_check: true

report:
  output_dir: "reports"
  format: ["markdown", "json"]
  include_cases:
    failed: true
    borderline: true
